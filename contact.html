<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Quote | Sprayden</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <a href="index.html" class="brand">
    <img src="logo.png.PNG" alt="Sprayden logo">
  </a>

  <a href="index.html" class="topbar-btn">Home</a>
</header>

<section class="section quote-page">
  <p class="eyebrow">Free Quote</p>
  <h1>Request your free quote.</h1>

  <p class="section-text">
    Tell us what you would like sprayed and we’ll get back to you as soon as possible.
  </p>

  <form name="quote" method="POST" data-netlify="true" enctype="multipart/form-data" class="quote-form">
    <input type="hidden" name="form-name" value="quote">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email Address">

    <select name="service" required>
      <option value="">Choose Service</option>
      <option>UPVC Windows</option>
      <option>Kitchen Spraying</option>
      <option>Composite Door</option>
      <option>Garage Door</option>
      <option>Conservatory</option>
      <option>Furniture</option>
      <option>Other</option>
    </select>

    <input type="text" name="area" placeholder="Town / Area">

    <textarea name="message" placeholder="Tell us about your project..." rows="5"></textarea>

    <label class="upload-label">
      Upload photos optional
      <input type="file" name="photos" multiple>
    </label>

    <p class="form-note">We aim to respond to all enquiries within 24 hours.</p>

    <button type="submit" class="btn primary">Request Free Quote</button>
  </form>

  <div class="footer-contact">
    <a href="tel:07724430225">📞 07724 430225</a>
    <a href="mailto:info@sprayden.co.uk">✉️ info@sprayden.co.uk</a>
    <a href="https://wa.me/447724430225">💬 WhatsApp</a>
  </div>
</section>

<footer>
  <img src="logo.png.PNG" alt="Sprayden Logo">
  <p>© 2026 Sprayden. All Rights Reserved.</p>
</footer>

</body>
</html>
